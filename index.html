<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>นามบัตรออนไลน์ของฉัน</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <main class="card">

    <img
      class="card__avatar"
      src="https://avatars.githubusercontent.com/u/9919?v=4"
      alt="รูปโปรไฟล์"
    >

    <!-- ชื่อ -->
    <h1 id="profileName" class="card__name">
      ธรรมรัตน์ ไพลสาลี
    </h1>

    <p class="card__title">
      นักศึกษาวิศวกรรมคอมพิวเตอร์
    </p>

    <p class="card__bio">
      กำลังเรียนรู้ Full-stack Development และ DevOps
    </p>

    <ul class="card__links">
      <li>
        <a href="https://github.com/thammaratspl-crypto/select-myprofile.git" target="_blank">
          GitHub
        </a>
      </li>

      <li>
        <a href="mailto:your-email@example.com">
          Email
        </a>
      </li>
    </ul>

    <button id="theme-toggle" class="card__button">
      🌙 โหมดกลางคืน
    </button>

    <h2 class="card__student">
      หัวข้อพิเศษทางด้านการพัฒนาซอฟต์แวร์
    </h2>

    <!-- ช่องกรอกชื่อ -->
    <input
      id="nameInput"
      type="text"
      placeholder="กรอกชื่อใหม่"
    >

    <footer id="card-footer" class="card__footer"></footer>

  </main>

  <script src="./script.js"></script>
